services:
  - type: web
    name: logica
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: LOGICA_STATE_DIR
        value: /data/.logica
      - key: LOGICA_WORKSPACE_DIR
        value: /data/workspace
      - key: LOGICA_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: logica-data
      mountPath: /data
      sizeGB: 1
