services:
  logica-gateway:
    image: ${LOGICA_IMAGE:-logica:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      LOGICA_GATEWAY_TOKEN: ${LOGICA_GATEWAY_TOKEN}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${LOGICA_CONFIG_DIR}:/home/node/.logica
      - ${LOGICA_WORKSPACE_DIR}:/home/node/.logica/workspace
    ports:
      - "${LOGICA_GATEWAY_PORT:-18789}:18789"
      - "${LOGICA_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${LOGICA_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]

  logica-cli:
    image: ${LOGICA_IMAGE:-logica:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      LOGICA_GATEWAY_TOKEN: ${LOGICA_GATEWAY_TOKEN}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${LOGICA_CONFIG_DIR}:/home/node/.logica
      - ${LOGICA_WORKSPACE_DIR}:/home/node/.logica/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
