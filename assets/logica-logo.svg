<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#A855F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E84142;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A855F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E84142;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Icon: Abstract neural/signal mark -->
  <g transform="translate(20, 20)">
    <!-- Outer ring -->
    <circle cx="80" cy="80" r="70" stroke="url(#iconGrad)" stroke-width="4" fill="none" opacity="0.3"/>
    <!-- Inner diamond/signal shape -->
    <path d="M80 20 L130 80 L80 140 L30 80 Z" stroke="url(#iconGrad)" stroke-width="3" fill="none"/>
    <!-- Center pulse -->
    <circle cx="80" cy="80" r="8" fill="url(#iconGrad)"/>
    <!-- Signal lines -->
    <line x1="80" y1="45" x2="80" y2="72" stroke="url(#iconGrad)" stroke-width="2.5"/>
    <line x1="80" y1="88" x2="80" y2="115" stroke="url(#iconGrad)" stroke-width="2.5"/>
    <line x1="55" y1="80" x2="72" y2="80" stroke="url(#iconGrad)" stroke-width="2.5"/>
    <line x1="88" y1="80" x2="105" y2="80" stroke="url(#iconGrad)" stroke-width="2.5"/>
    <!-- Corner dots -->
    <circle cx="80" cy="20" r="4" fill="url(#iconGrad)"/>
    <circle cx="130" cy="80" r="4" fill="url(#iconGrad)"/>
    <circle cx="80" cy="140" r="4" fill="url(#iconGrad)"/>
    <circle cx="30" cy="80" r="4" fill="url(#iconGrad)"/>
  </g>

  <!-- Text: LOGICA -->
  <text x="200" y="118" font-family="'SF Pro Display', 'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="700" letter-spacing="8" fill="url(#grad)">LOGICA</text>

  <!-- Tagline -->
  <text x="203" y="155" font-family="'SF Pro Display', 'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="400" letter-spacing="4" fill="#9CA3AF">AUTONOMOUS  AI  AGENT  FOR  ARENA</text>
</svg>
